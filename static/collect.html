<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Drawing-RNG Collection</title><link rel="stylesheet" href="/style.css"></head><body><main class="container"><header class="top"><div class="brand"><h1>Prompt Doodle Collection</h1><p>Draw naturally. Do not include names, signatures, initials, passwords, or private symbols.</p></div><a class="btn" href="/">Home</a></header><section class="grid"><div class="panel"><div class="prompt-box"><span>Current prompt</span><strong id="promptText">Star</strong></div><div class="canvas-wrap"><canvas id="canvas" width="1200" height="900"></canvas></div><div class="toolbar"><button class="btn" id="undo">Undo</button><button class="btn red" id="clear">Clear</button><button class="btn primary" id="tokenize">Generate tokens</button><button class="btn green" id="save">Save sample</button></div><p class="muted small"><span id="count">0 strokes</span></p></div><aside class="panel"><h2>Label sample</h2><p class="muted small">Participant: <b id="pid"></b> <button class="btn" id="newPid" type="button">New participant</button></p><div class="field"><label>Prompt / concept</label><select id="concept"><option>star</option><option>heart</option><option>spiral</option><option>triangle</option><option>stickman</option><option>flower</option><option>house_lake</option><option>custom_symbol</option></select></div><div class="field"><label>Redraw #</label><input id="redraw" type="number" min="1" value="1"></div><div class="field"><label>Notes</label><textarea id="notes" placeholder="Device, mouse/touch, anything unusual. No personal info."></textarea></div><label><input id="consent" type="checkbox" checked> I understand this saves anonymous drawing strokes for research/demo analysis.</label><div id="status" class="output" style="margin-top:14px">Ready.</div></aside></section></main><script src="/shared.js"></script><script src="/collect.js"></script></body></html>
